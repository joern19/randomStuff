services:
  - name: radicale
    run: "-p 8080:8080 ghcr.io/kozea/radicale:3.6.0"
  - name: registry
    run: "-p 5000:5000 docker.io/library/registry:3"
  - run: >-
      --network=host --cap-add=NET_ADMIN --device=/dev/ttyUSB0 --device=/dev/net/tun --volume=/var/lib/otbr:/data
      -e=OT_RCP_DEVICE=spinel+uart:///dev/ttyUSB0?uart-baudrate=1000000
      -e=INFRA_IF=eth0
      -e=OT_THREAD_IF=thread0
      docker.io/openthread/border-router
    name: open_thread_boarder_router
